name: Test

on:
  workflow_dispatch:
    inputs:
      mm_version:
        description: "Motion Master image tag"
        default: "v5.4.1-flatbot.18"
        required: false
      mm_api_version:
        description: "Motion Master API image"
        default: "v0.0.390"
        required: false
      file_filter:
        description: "File path pattern to run (e.g. integro, circulo)"
        default: ""
        required: false
      test_name_filter:
        description: "Test name pattern to run (-t flag, e.g. offset)"
        default: ""
        required: false
      stream_api_logs:
        description: "Stream motion-master-api container logs to the run output"
        type: boolean
        default: true
        required: false
      stream_mm_logs:
        description: "Stream motion-master container logs to the run output"
        type: boolean
        default: false
        required: false

jobs:
  test:
    name: Run tests
    runs-on: [self-hosted, OptiPlex-3080]
    timeout-minutes: 60
    env:
      CI: "true"
      MM_VERSION: ${{ inputs.mm_version }}
      MM_API_VERSION: ${{ inputs.mm_api_version }}
      MM_MAC: "A4:BB:6D:77:0B:D2"
      MM_DRV: soem
      MM_REQ_RES_PORT: "63524"
      MM_PUB_SUB_PORT: "63525"
      MM_API_PORT: "63526"
      MM_PDO_MODE: monitor
      PSU_URL: "http://192.168.212.103"
      STREAM_API_LOGS: ${{ inputs.stream_api_logs }}
      STREAM_MM_LOGS: ${{ inputs.stream_mm_logs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run tests
        run: |
          CMD="npx vitest run"
          [ -n "${{ inputs.file_filter }}" ] && CMD="$CMD ${{ inputs.file_filter }}"
          [ -n "${{ inputs.test_name_filter }}" ] && CMD="$CMD -t '${{ inputs.test_name_filter }}'"
          $CMD

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
