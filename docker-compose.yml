services:
  motion-master:
    image: synapticon/motion-master:v5.5.0
    container_name: motion-master
    network_mode: host
    privileged: true
    environment:
      MM_DRV: "${MM_DRV:-soem}"
      MM_MAC: "${MM_MAC}"
      MM_REQ_RES_PORT: "${MM_REQ_RES_PORT:-63524}"
      MM_PUB_SUB_PORT: "${MM_PUB_SUB_PORT:-63525}"
      MM_IPS: "${MM_IPS:-}"
      MM_PDO_MODE: "${MM_PDO_MODE:-monitor}"
    restart: no

  motion-master-api:
    image: synapticon/motion-master-api:v0.0.396
    container_name: motion-master-api
    network_mode: host
    depends_on:
      - motion-master
    environment:
      PORT: "${MM_API_PORT:-63526}"
    restart: no

  oblac-drives:
    image: synapticon/oblac-drives:v3.1.1-flatbot.16
    container_name: oblac-drives
    depends_on:
      - motion-master
    ports:
      - "${OBLAC_DRIVES_PORT:-63527}:80"
    restart: no
