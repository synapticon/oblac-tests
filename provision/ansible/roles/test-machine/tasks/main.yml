---
- name: Install system packages
  ansible.builtin.apt:
    name: "{{ packages }}"
    state: present
    update_cache: true

- name: Install VS Code
  community.general.snap:
    name: code
    classic: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ username }}"
    groups: docker
    append: true

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.local/bin"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'

- name: Install PSU control scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ home_dir }}/.local/bin/{{ item }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'
  loop:
    - psu-on
    - psu-off
