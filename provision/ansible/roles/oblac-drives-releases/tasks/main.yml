---
- name: Install sync-oblac-drives-releases dependencies
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present
    update_cache: true

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ home_dir }}/.local/bin"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'

- name: Install sync-oblac-drives-releases script
  ansible.builtin.copy:
    src: sync-oblac-drives-releases
    dest: "{{ home_dir }}/.local/bin/sync-oblac-drives-releases"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: '0755'

- name: Sync oblac-drives release deb files to ~/oblac-drives-releases
  become: true
  become_user: "{{ username }}"
  ansible.builtin.command: "{{ home_dir }}/.local/bin/sync-oblac-drives-releases"
  environment:
    OBLAC_DRIVES_RELEASES_DIR: "{{ home_dir }}/oblac-drives-releases"
  register: oblac_drives_sync
  changed_when: "'download' in oblac_drives_sync.stdout"
